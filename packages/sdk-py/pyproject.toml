[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "orderflow-sdk"
version = "0.0.0"
description = "Python SDK for the Orderflow Lab matching engine."
readme = "README.md"
requires-python = ">=3.12"
license = { text = "UNLICENSED" }
classifiers = [
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "orderflow-engine",
    "numpy>=2.0",
]

[project.optional-dependencies]
dev = ["pytest>=8", "pytest-cov>=5"]

[tool.hatch.build.targets.wheel]
packages = ["src/orderflow_sdk"]

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
